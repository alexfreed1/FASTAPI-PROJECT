services:
  - type: web
    name: attendance-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-pg
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALCHEMY_DATABASE_URL
        fromDatabase:
          name: attendance-pg
          property: connectionString
      - key: PYTHONPATH
        value: .

databases:
  - name: attendance-pg
    databaseName: attendance
    user: attendance_user

